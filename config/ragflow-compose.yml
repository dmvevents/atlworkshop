volumes:
  ragflow_data:
    driver: local
  ragflow_uploads:
    driver: local
  # elasticsearch_data:
  #   driver: local
  # redis_data:
  #   driver: local
  # milvus_data:
  #   driver: local

networks:
  ragflow_network:
    driver: bridge

