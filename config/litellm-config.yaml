# LiteLLM Proxy Configuration
# Provides unified /v1/chat/completions endpoint for all providers
# Start: litellm --config config/litellm-config.yaml --port 4000
#
# Port: 4000 (does not conflict with zoekt:6070, opengrok:8080, ragflow:9380)

model_list:
  # === Google Gemini Models ===
  - model_name: gemini-3-pro
    litellm_params:
      model: gemini/gemini-3-pro-preview
      api_key: os.environ/GOOGLE_API_KEY
    model_info:
      description: "Gemini 3 Pro Preview - SWE-bench #2 (77.4%)"
      max_tokens: 65536

  - model_name: gemini-3-flash
    litellm_params:
      model: gemini/gemini-3-flash-preview
      api_key: os.environ/GOOGLE_API_KEY
    model_info:
      description: "Gemini 3 Flash Preview - fast, cheap"

  - model_name: gemini-2.5-pro
    litellm_params:
      model: gemini/gemini-2.5-pro
      api_key: os.environ/GOOGLE_API_KEY
    model_info:
      description: "Gemini 2.5 Pro - strong reasoning, 1M context"

  - model_name: gemini-2.5-flash
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/GOOGLE_API_KEY
    model_info:
      description: "Gemini 2.5 Flash - fast, cost-effective"

  # === OpenAI Models ===
  - model_name: gpt-5.2
    litellm_params:
      model: openai/gpt-5.2
      api_key: os.environ/OPENAI_API_KEY
    model_info:
      description: "GPT-5.2 - latest OpenAI frontier model"

  - model_name: gpt-5
    litellm_params:
      model: openai/gpt-5
      api_key: os.environ/OPENAI_API_KEY
    model_info:
      description: "GPT-5 - SWE-bench 74.4%"

  - model_name: o3
    litellm_params:
      model: openai/o3
      api_key: os.environ/OPENAI_API_KEY
    model_info:
      description: "o3 - OpenAI reasoning model"

  - model_name: o3-pro
    litellm_params:
      model: openai/o3-pro
      api_key: os.environ/OPENAI_API_KEY
    model_info:
      description: "o3-pro - highest quality OpenAI reasoning"

  - model_name: gpt-4.1
    litellm_params:
      model: openai/gpt-4.1
      api_key: os.environ/OPENAI_API_KEY
    model_info:
      description: "GPT-4.1 - fast, capable"

  - model_name: o4-mini
    litellm_params:
      model: openai/o4-mini
      api_key: os.environ/OPENAI_API_KEY
    model_info:
      description: "o4-mini - fast reasoning, cost-effective"

  # === AWS Bedrock (Claude via IAM) ===
  - model_name: claude-sonnet
    litellm_params:
      model: bedrock/us.anthropic.claude-sonnet-4-5-20250929-v1:0
      aws_region_name: us-east-2
    model_info:
      description: "Claude Sonnet 4.5 via AWS Bedrock"

# === Routing ===
router_settings:
  routing_strategy: simple-shuffle  # simple-shuffle, least-busy, latency-based
  num_retries: 2
  timeout: 120

# === Cost Tracking ===
general_settings:
  master_key: os.environ/LITELLM_API_KEY
  database_url: ""  # Optional: postgres for persistent cost tracking
