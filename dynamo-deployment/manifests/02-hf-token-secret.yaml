# Optional: HuggingFace token for gated models (Llama, Mistral, etc.)
# Qwen models are public and don't need this, but larger models may.
#
# Create with:
#   kubectl create secret generic hf-token-secret \
#     -n workshop \
#     --from-literal=HUGGING_FACE_HUB_TOKEN=<YOUR_HF_TOKEN>
#
# Or apply this file after filling in the token:
apiVersion: v1
kind: Secret
metadata:
  name: hf-token-secret
  namespace: workshop
type: Opaque
stringData:
  HUGGING_FACE_HUB_TOKEN: "<YOUR_HF_TOKEN>"
