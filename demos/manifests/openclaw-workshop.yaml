# OpenClaw Workshop Deployment - AI Assistant Gateway
# Replace <PLACEHOLDERS> before applying
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config
  namespace: workshop
data:
  GATEWAY_PORT: "18789"
  DEFAULT_MODEL: "claude-opus-4-6"
  ENABLE_WHATSAPP: "true"
  ENABLE_SLACK: "false"
  LLM_PROVIDER: "bedrock"
  AWS_REGION: "us-east-1"
---
apiVersion: v1
kind: Secret
metadata:
  name: openclaw-secrets
  namespace: workshop
type: Opaque
stringData:
  WHATSAPP_TOKEN: "<YOUR_WHATSAPP_TOKEN>"         # TODO: replace
  WHATSAPP_VERIFY_TOKEN: "<YOUR_VERIFY_TOKEN>"     # TODO: replace
  WHATSAPP_PHONE_ID: "<YOUR_PHONE_NUMBER_ID>"      # TODO: replace
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw-gateway
  namespace: workshop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openclaw-gateway
  template:
    metadata:
      labels:
        app: openclaw-gateway
    spec:
      containers:
      - name: gateway
        image: <YOUR_ECR_REGISTRY>/openclaw-gateway:latest  # TODO: replace
        ports:
        - containerPort: 18789
          name: http
        envFrom:
        - configMapRef:
            name: openclaw-config
        - secretRef:
            name: openclaw-secrets
        resources:
          requests:
            cpu: "1"
            memory: "2Gi"
          limits:
            cpu: "2"
            memory: "4Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 18789
          initialDelaySeconds: 10
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: openclaw-svc
  namespace: workshop
spec:
  type: ClusterIP
  selector:
    app: openclaw-gateway
  ports:
  - name: http
    port: 18789
    targetPort: 18789
